name: Validate & Generate Locations

on:
  push:
    paths:
      - 'Locations/**'
      - 'schemas/**'
      - 'scripts/generate-masterlist.py'
      - 'scripts/validate-locations.py'
      - '.github/workflows/validate-locations.yml'
  pull_request:
    paths:
      - 'Locations/**'
      - 'schemas/**'
      - 'scripts/generate-masterlist.py'
      - 'scripts/validate-locations.py'
      - '.github/workflows/validate-locations.yml'

jobs:
  validate-and-generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate all location files & generate masterlist.json
        run: python scripts/generate-masterlist.py

      - name: Commit updated masterlist.json (if changed)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate masterlist.json from Locations/ sources [skip ci]"
          file_pattern: masterlist.json
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"