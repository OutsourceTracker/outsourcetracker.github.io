<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Trucking Locations</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="favicon.svg">
  <meta name="theme-color" content="#0f172a">
  <link rel="stylesheet" href="styles/style.css">
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "xm4nsc6hp6");
   </script>
</head>
<body>
  <header>
    <div class="header-content">
      <h1>Trucking Facility Maps</h1>
      <div class="controls">
        <input type="text" id="search" placeholder="Search locations..." onkeyup="filterLocations()">
        <a href="editor/index.html" class="btn-link">Add Location</a>
        <button id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">🌙</button>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-filters">
        <select id="filter-category" onchange="filterLocations()">
          <option value="">All Categories</option>
        </select>
      </div>
      <ul id="location-list"></ul>
    </div>
    <div class="map-container">
      <div id="map"></div>
    </div>
  </div>

  <script src="scripts/theme.js"></script>
  <script src="scripts/marker-icons.js"></script>
  <script src="scripts/script.js"></script>
  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDRaPp2QmC2QO47AypZnI8L4tLRuDWqd70&libraries=geometry,marker&loading=async&callback=initApp"></script>
</body>
</html>
